version: "3.9"

services:
  # ─── Banco de dados do Auth Service ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: authdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Banco de dados do Chat Service ───────────────────────────────────────
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: chatdb
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Auth Service ──────────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    environment:
      PORT: 3001
      DATABASE_URL: postgres://chatuser:chatpass@postgres:5432/authdb
      JWT_SECRET: s3gr3d0_jwt_super_secreto_2026
      JWT_EXPIRES_IN: 24h
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Chat Service (escalável horizontalmente) ─────────────────────────────
  chat-service:
    build: ./chat-service
    environment:
      PORT: 3002
      MONGO_URL: mongodb://mongo:27017/chatdb
      JWT_SECRET: s3gr3d0_jwt_super_secreto_2026
      AUTH_SERVICE_URL: http://auth-service:3001
    depends_on:
      mongo:
        condition: service_healthy
      auth-service:
        condition: service_healthy

  # ─── Nginx: API Gateway + Balanceador de Carga ────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - auth-service
      - chat-service

volumes:
  postgres_data:
  mongo_data:
